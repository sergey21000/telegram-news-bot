name: Daily Reminders

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  send-reminders:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: 3.12

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Run reminders
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ML_2025_REMINDER_LINK: ${{ vars.ML_2025_REMINDER_LINK }}
          ML_2025_2_REMINDER_LINK: ${{ vars.ML_2025_2_REMINDER_LINK }}
        run: uv run run_send.py --reminder
